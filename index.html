<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Курс monobank</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }
  .wrap {
    height: 100%;
    width: 100%;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .title {
    color: #ffffff;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.2px;
  }
  .badge {
    background: #000000;
    color: #ffffff;
    border: 1px solid #333;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .list {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #111111;
    border-radius: 10px;
    padding: 10px 12px;
  }
  .cur {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .flag {
    font-size: 18px;
  }
  .code {
    color: #ffffff;
    font-size: 13px;
    font-weight: 600;
  }
  .rates {
    text-align: right;
  }
  .buy {
    color: #9be15d;
    font-size: 14px;
    font-weight: 700;
  }
  .sell {
    color: #ff6b6b;
    font-size: 12px;
  }
  .footer {
    margin-top: 8px;
    text-align: center;
    color: #666;
    font-size: 10px;
  }
  .loading {
    color: #888;
    text-align: center;
    padding: 20px;
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div class="title">mono курс</div>
    <div class="badge">UAH</div>
  </div>
  <div class="list" id="list">
    <div class="loading">Завантаження...</div>
  </div>
  <div class="footer">Купівля / Продаж · дані monobank, оновлення ~5 хв</div>
</div>

<script>
  const PAIRS = [
    { a: 840, flag: "🇺🇸", code: "USD" },
    { a: 978, flag: "🇪🇺", code: "EUR" },
    { a: 985, flag: "🇵🇱", code: "PLN" },
    { a: 826, flag: "🇬🇧", code: "GBP" }
  ];
  const UAH = 980;

  async function load() {
    const listEl = document.getElementById("list");
    try {
      const res = await fetch("https://api.monobank.ua/bank/currency");
      const data = await res.json();

      const rows = PAIRS.map(p => {
        const found = data.find(d => d.currencyCodeA === p.a && d.currencyCodeB === UAH);
        if (!found) return null;
        return `
          <div class="row">
            <div class="cur">
              <span class="flag">${p.flag}</span>
              <span class="code">${p.code}</span>
            </div>
            <div class="rates">
              <div class="buy">${found.rateBuy.toFixed(2)}</div>
              <div class="sell">${found.rateSell.toFixed(2)}</div>
            </div>
          </div>
        `;
      }).filter(Boolean);

      listEl.innerHTML = rows.length
        ? rows.join("")
        : '<div class="loading">Дані тимчасово недоступні</div>';
    } catch (e) {
      listEl.innerHTML = '<div class="loading">Помилка завантаження</div>';
    }
  }

  load();
  setInterval(load, 5 * 60 * 1000);
</script>

</body>
</html>
