<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Курс НБУ</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(180deg, #0057B7 0%, #0057B7 55%, #FFD700 55%, #FFD700 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }
  .wrap {
    height: 100%;
    width: 100%;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .title {
    color: #ffffff;
    font-size: 15px;
    font-weight: 700;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .badge {
    background: rgba(255,255,255,0.25);
    color: #ffffff;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.4);
  }
  .list {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 7px;
    overflow-y: auto;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.92);
    border-radius: 10px;
    padding: 9px 12px;
  }
  .cur {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .flag {
    font-size: 18px;
  }
  .code {
    color: #14213D;
    font-size: 13px;
    font-weight: 700;
  }
  .rate {
    color: #0057B7;
    font-size: 16px;
    font-weight: 800;
  }
  .footer {
    margin-top: 8px;
    text-align: center;
    color: #ffffff;
    font-size: 10px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .loading {
    color: #14213D;
    text-align: center;
    padding: 20px;
    font-size: 13px;
    background: rgba(255,255,255,0.9);
    border-radius: 10px;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div class="title">НБУ офіційний курс</div>
    <div class="badge">UAH</div>
  </div>
  <div class="list" id="list">
    <div class="loading">Завантаження...</div>
  </div>
  <div class="footer">Дані Національного банку України</div>
</div>

<script>
  const CODES = [
    { code: "USD", flag: "🇺🇸" },
    { code: "EUR", flag: "🇪🇺" },
    { code: "PLN", flag: "🇵🇱" },
    { code: "GBP", flag: "🇬🇧" },
    { code: "AED", flag: "🇦🇪" }
  ];

  async function load() {
    const listEl = document.getElementById("list");
    try {
      const res = await fetch("https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?json");
      const data = await res.json();

      const rows = CODES.map(c => {
        const found = data.find(d => d.cc === c.code);
        if (!found) return null;
        return `
          <div class="row">
            <div class="cur">
              <span class="flag">${c.flag}</span>
              <span class="code">${c.code}</span>
            </div>
            <div class="rate">${found.rate.toFixed(2)}</div>
          </div>
        `;
      }).filter(Boolean);

      listEl.innerHTML = rows.length
        ? rows.join("")
        : '<div class="loading">Дані тимчасово недоступні</div>';
    } catch (e) {
      listEl.innerHTML = '<div class="loading">Помилка завантаження</div>';
    }
  }

  load();
  setInterval(load, 60 * 60 * 1000);
</script>

</body>
</html>
